<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Calculadora</title>
<style>
body{
font-family:sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:#eaeaea;
}
.calculadora{
background:#2b2b2b;
padding:20px;
border-radius:10px;
width:260px;
}
.display{
background:#000;
color:#0f0;
font-size:2rem;
padding:10px;
text-align:right;
margin-bottom:10px;
border-radius:5px;
}
.botoes{
display:flex;
flex-wrap:wrap;
gap:10px;
}
button{
flex:1 0 22%;
padding:15px;
font-size:1rem;
border:none;
border-radius:5px;
cursor:pointer;
background:#444;
color:white;
}
button.operador{
background:#ff9500;
}
button.igual{
background:#28a745;
flex:1 0 48%;
}
button.clear{
background:#dc3545;
flex:1 0 48%;
}
</style>
</head>
<body>
<div class="calculadora">
<div id="display" class="display">0</div>
<div class="botoes">
<button onclick="numero('7')">7</button>
<button onclick="numero('8')">8</button>
<button onclick="numero('9')">9</button>
<button class="operador" onclick="operador('/')">/</button>

<button onclick="numero('4')">4</button>
<button onclick="numero('5')">5</button>
<button onclick="numero('6')">6</button>
<button class="operador" onclick="operador('*')">*</button>

<button onclick="numero('1')">1</button>
<button onclick="numero('2')">2</button>
<button onclick="numero('3')">3</button>
<button class="operador" onclick="operador('-')">-</button>

<button onclick="numero('0')">0</button>
<button class="operador" onclick="operador('+')">+</button>
<button class="igual" onclick="calcular()">=</button>
<button class="clear" onclick="limpar()">C</button>
</div>
</div>

<script>
let memoria=null
let atual=''
let op=null

function atualizar(){
document.getElementById('display').innerText=atual||memoria||0
}

function numero(n){
atual+=n
atualizar()
}

function operador(o){
if(atual!==''){
if(memoria===null){
memoria=parseFloat(atual)
}else{
memoria=eval(memoria+op+atual)
}
}
op=o
atual=''
atualizar()
}

function calcular(){
if(memoria!==null&&atual!==''){
memoria=eval(memoria+op+atual)
atual=''
op=null
atualizar()
}
}

function limpar(){
memoria=null
atual=''
op=null
atualizar()
}

atualizar()
</script>
</body>
</html>
